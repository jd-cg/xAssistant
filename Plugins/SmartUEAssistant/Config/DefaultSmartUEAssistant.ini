SupportedModels=deepseek-chat
RequestTimeout=100
MaxTokens=8192
Temperature=0.7

; UI Settings
WindowWidth=800
WindowHeight=600
ShowDebugInfo=False

; Plugin Behavior
AutoStartWithEditor=True
EnableVoiceCommands=False
LogLevel=Info

; Scene Context (新功能默认配置)
