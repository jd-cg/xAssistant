; 说明：
; 1. OpenAI API密钥：https://platform.openai.com/api-keys
; 2. DeepSeek API密钥：https://platform.deepseek.com/api_keys
; 3. 支持的模型：gpt-3.5-turbo, gpt-4, deepseek-chat
; 4. 温度范围：0.0-2.0（越高越随机）
; 5. 最大令牌数：控制响应长度
; 6. 使用DeepSeek时设置：
;    BaseURL=https://api.deepseek.com
;    SupportedModels=deepseek-chat